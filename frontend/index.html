<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlissTracker</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA / Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="/logo-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/logo-512.png" />
    <!-- Tema oscuro: aplicar ANTES del primer paint para evitar flash blanco -->
    <script>
      (function() {
        try {
          // 1. Parámetro ?theme= en la URL (pasado al redirigir desde subdominio — tiene prioridad)
          var theme = new URLSearchParams(window.location.search).get('theme');
          // 2. localStorage (mismo origen)
          if (!theme) theme = localStorage.getItem('theme');
          // 3. Cookie compartida entre subdominios
          if (!theme) {
            var m = document.cookie.match(/(?:^|;\s*)theme=([^;]*)/);
            theme = m ? m[1] : null;
          }
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>

    <!-- Políticas — declaradas en HTML estático para bots (Google OAuth verification) -->
    <link rel="privacy-policy" href="https://www.blisstracker.app/privacidad" />
    <link rel="terms-of-service" href="https://www.blisstracker.app/condiciones" />

    <!-- Google Analytics — solo en el dominio raíz (landing), no en workspaces -->
    <script>
      (function() {
        var host = window.location.hostname;
        var isLanding = host === 'blisstracker.app' || host === 'www.blisstracker.app';
        if (!isLanding) return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-4QGEYVGY43';
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ window.dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', 'G-4QGEYVGY43');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
